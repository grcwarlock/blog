# Site settings
title: Warlock Musings
description: A clean, editorial blog.
url: "https://grcwarlock.github.io"
baseurl: "/blog"
author: Your Name

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/
timezone: America/Denver

# Pagination (requires jekyll-paginate)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .DS_Store
